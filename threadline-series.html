<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Threadline — Series</title>
<link rel="preconnect" href="https://api.fontshare.com" crossorigin>
<link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700,900&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#0f172a;--muted:#54607a;--faint:#8b96ad;
  --line:#e6e9f1;--line-2:#eef1f7;--bg:#f7f8fb;--surface:#ffffff;--surface-2:#f2f4f9;--slate:#0f172a;
  --violet:#803dff;--blue:#3b82f6;--cyan:#22d3ee;--coral:#fb7185;
  --green:#20b878;--amber:#f5a524;
  --grad2:linear-gradient(135deg,#803dff,#3b82f6);
  --shadow:0 18px 50px rgba(20,20,60,.10);--shadow-sm:0 4px 16px rgba(20,20,60,.06);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Satoshi',system-ui,-apple-system,sans-serif;color:var(--ink);min-height:100vh;background:var(--bg);-webkit-font-smoothing:antialiased;line-height:1.5}
h1,h2,h3,h4{font-family:'Satoshi';font-weight:900;letter-spacing:-.02em;line-height:1.15}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,textarea,select{font-family:inherit}
.mark{display:inline-block;width:28px;height:28px;flex-shrink:0}.mark svg{width:100%;height:100%;display:block}

.app{display:grid;grid-template-columns:236px 1fr;min-height:100vh}
/* ---------- mobile nav (drawer) ---------- */
.hamb{display:none;align-items:center;justify-content:center;width:40px;height:40px;border-radius:12px;border:1px solid var(--line-2);background:var(--surface);font-size:18px;line-height:1;cursor:pointer;flex:0 0 auto;color:inherit}
.scrim{display:none}
@media(max-width:980px){
.app{display:block}
.main{min-height:100vh}
.hamb{display:inline-flex}
.app .sidebar{display:flex;position:fixed;top:0;left:0;bottom:0;height:100dvh;width:min(300px,84vw);z-index:70;transform:translateX(-105%);transition:transform .28s cubic-bezier(.4,0,.2,1);box-shadow:0 24px 70px rgba(15,18,34,.28)}
.app.nav-open .sidebar{transform:translateX(0)}
.scrim{display:block;position:fixed;inset:0;background:rgba(15,18,34,.45);z-index:65;opacity:0;pointer-events:none;transition:opacity .25s}
.app.nav-open .scrim{opacity:1;pointer-events:auto}
.topbar{padding:12px 16px;gap:10px}
}
@media(max-width:600px){.topbar{padding:10px 12px}}
.sidebar{background:var(--surface);border-right:1px solid var(--line-2);padding:20px 14px;display:flex;flex-direction:column;position:sticky;top:0;height:100vh}
.logo{display:flex;align-items:center;gap:9px;font-weight:900;font-size:18px;padding:2px 10px 18px}
.nav{display:flex;flex-direction:column;gap:3px}
.nitem{display:flex;flex-direction:column;padding:9px 12px;border-radius:12px;text-align:left;transition:.13s}
.nitem b{font-size:14.5px;font-weight:800;display:flex;align-items:center;gap:9px}
.nitem span{font-size:11.5px;color:var(--faint);margin-left:25px;margin-top:1px}
.nitem:hover{background:var(--surface-2)}
.nitem.on{background:rgba(128,61,255,.08)}
.nitem.on b{color:var(--violet)}
.nitem .ic{width:16px;text-align:center}
.sfoot{margin-top:auto;display:flex;flex-direction:column;gap:4px}
.wsrow{display:flex;align-items:center;gap:10px;padding:9px 10px;border:1px solid var(--line-2);border-radius:12px;cursor:pointer}
.wsrow:hover{background:var(--surface-2)}
.avv{width:32px;height:32px;border-radius:9px;background:var(--grad2);color:#fff;font-weight:900;font-size:12.5px;display:grid;place-items:center;flex-shrink:0}
.avv.round{border-radius:50%}
.wsrow .wt b{display:block;font-size:13px;font-weight:800}
.wsrow .wt span{font-size:11.5px;color:var(--faint)}
.setrow{display:flex;align-items:center;gap:9px;padding:9px 12px;color:var(--muted);font-weight:700;font-size:13.5px;border-radius:10px}
.setrow:hover{background:var(--surface-2)}

.main{min-width:0;padding-bottom:60px}
.topbar{position:sticky;top:0;z-index:25;display:flex;align-items:center;gap:14px;padding:14px 28px;background:rgba(247,248,251,.9);backdrop-filter:blur(10px);border-bottom:1px solid var(--line-2)}
.search{flex:0 1 340px;display:flex;align-items:center;gap:9px;background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:9px 14px;color:var(--faint);font-size:14px;cursor:text}
.search .kbd{margin-left:auto;font-size:11px;font-weight:800;border:1px solid var(--line);border-radius:6px;padding:2px 7px;color:var(--faint)}
.bell{margin-left:auto;position:relative;width:40px;height:40px;border-radius:11px;display:grid;place-items:center;font-size:17px}
.bell:hover{background:var(--surface-2)}
.bell i{position:absolute;top:4px;right:4px;background:var(--coral);color:#fff;font-style:normal;font-size:10px;font-weight:900;min-width:16px;height:16px;border-radius:9px;display:grid;place-items:center;padding:0 4px}
.newspark{display:inline-flex;align-items:center;gap:8px;background:var(--grad2);color:#fff;font-weight:800;font-size:14px;padding:11px 18px;border-radius:12px;box-shadow:0 8px 20px rgba(128,61,255,.25)}
.newspark:hover{filter:brightness(1.06)}

.content{display:grid;grid-template-columns:1fr 330px;gap:22px;padding:26px 28px 0;max-width:1440px}
@media(max-width:1150px){.content{grid-template-columns:1fr}}
.colmain{min-width:0}
.greet h1{font-size:clamp(24px,3vw,30px)}
.greet p{color:var(--muted);font-size:14.5px;margin-top:4px}

.tabs{display:flex;gap:4px;margin-top:18px;border-bottom:1.5px solid var(--line-2)}
.tab{padding:10px 16px;font-weight:800;font-size:14px;color:var(--muted);border-bottom:2.5px solid transparent;margin-bottom:-1.5px;display:flex;align-items:center;gap:7px}
.tab:hover{color:var(--ink)}
.tab.on{color:var(--violet);border-bottom-color:var(--violet)}
.tab .n{background:var(--surface-2);color:var(--muted);font-size:11px;font-weight:800;border-radius:7px;padding:1px 7px}
.tab.on .n{background:rgba(128,61,255,.12);color:var(--violet)}

/* generator inputs */
.genbox{background:var(--surface);border:1px solid var(--line);border-radius:18px;padding:20px;margin-top:16px;box-shadow:var(--shadow-sm)}
.grow2{display:grid;grid-template-columns:1.4fr 1fr 1fr;gap:13px}
.grow3{display:grid;grid-template-columns:1fr 1fr 1fr auto;gap:13px;margin-top:13px;align-items:end}
@media(max-width:900px){.grow2,.grow3{grid-template-columns:1fr}}
.gf label{display:block;font-weight:700;font-size:12px;color:var(--muted);margin-bottom:6px}
.gf textarea,.gf select,.gf input{width:100%;border:1.5px solid var(--line);border-radius:12px;padding:11px 13px;font-size:13.5px;color:var(--ink);outline:none;background:var(--surface);font-weight:600}
.gf textarea{min-height:64px;resize:none;line-height:1.4}
.gf textarea:focus,.gf select:focus{border-color:var(--violet)}
.genbtn{background:var(--grad2);color:#fff;font-weight:800;font-size:14px;padding:12px 18px;border-radius:12px;box-shadow:0 8px 20px rgba(128,61,255,.25);white-space:nowrap}
.genbtn:hover{filter:brightness(1.06)}

.reflect{display:none;margin-top:14px;background:linear-gradient(135deg,rgba(128,61,255,.06),rgba(59,130,246,.04));border:1px solid var(--line);border-left:4px solid var(--violet);border-radius:14px;padding:14px 17px;font-size:14px;line-height:1.55;animation:fade .3s ease}
.reflect.on{display:block}
.reflect b{font-weight:800}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.thinking{display:none;align-items:center;gap:9px;color:var(--violet);font-weight:700;font-size:13.5px;margin-top:16px}
.thinking.on{display:flex}
.dots{display:inline-flex;gap:4px}.dots i{width:6px;height:6px;border-radius:50%;background:var(--violet);animation:bob 1s infinite}
.dots i:nth-child(2){animation-delay:.15s}.dots i:nth-child(3){animation-delay:.3s}
@keyframes bob{0%,100%{opacity:.3;transform:translateY(0)}50%{opacity:1;transform:translateY(-4px)}}

/* results */
.reshead{display:flex;align-items:center;gap:10px;margin:20px 0 4px}
.reshead h3{font-size:16px}
.mix{font-size:11px;font-weight:800;color:#178a5a;background:rgba(32,184,120,.1);border-radius:999px;padding:4px 11px}
.reshead .sp{flex:1}
.rl{font-weight:800;font-size:13px;color:var(--violet)}
.rl:hover{text-decoration:underline}
.concepts{display:flex;flex-direction:column;gap:12px;margin-top:10px}
.concept{display:grid;grid-template-columns:auto 1.25fr .95fr 1.15fr auto;gap:16px;background:var(--surface);border:1.5px solid var(--line);border-radius:16px;padding:17px;animation:fade .3s ease;align-items:start}
@media(max-width:1050px){.concept{grid-template-columns:auto 1fr;}}
.concept.active-done{border-color:rgba(32,184,120,.4)}
.cicon{width:46px;height:46px;border-radius:13px;display:grid;place-items:center;font-size:20px}
.cname{font-size:16px;font-weight:900;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.ptag{font-size:10px;font-weight:800;border-radius:7px;padding:2.5px 8px}
.pt-v{background:rgba(128,61,255,.1);color:var(--violet)}
.pt-a{background:rgba(245,165,36,.14);color:#b57708}
.pt-g{background:rgba(32,184,120,.1);color:#178a5a}
.pt-c{background:rgba(34,211,238,.14);color:#0e7f95}
.cdesc{color:var(--muted);font-size:12.5px;margin-top:5px;line-height:1.45}
.cwarn{margin-top:7px;font-size:11.5px;font-weight:700;color:#b57708;background:rgba(245,165,36,.1);border-radius:8px;padding:4px 9px;display:inline-block}
.cmeta h6{font-size:10.5px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;color:var(--faint);margin-bottom:4px}
.cmeta .cv{font-weight:800;font-size:13px}
.fchips{display:flex;gap:5px;margin-top:3px}
.fchips i{width:22px;height:22px;border-radius:6px;font-style:normal;display:grid;place-items:center;font-size:11px}
.f1{background:rgba(59,130,246,.12)}.f2{background:rgba(251,113,133,.12)}.f3{background:rgba(245,165,36,.14)}
.cmeta+.cmeta{margin-top:12px}
.eps h6{font-size:10.5px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;color:var(--faint);margin-bottom:5px}
.eps li{font-size:12.5px;color:var(--muted);list-style:none;padding:2px 0 2px 13px;position:relative;line-height:1.4}
.eps li::before{content:"";position:absolute;left:0;top:9px;width:4px;height:4px;border-radius:50%;background:var(--violet)}
.cacts{display:flex;flex-direction:column;gap:7px;min-width:140px}
.cb{border:1.5px solid var(--line);border-radius:10px;padding:8px 13px;font-weight:800;font-size:12.5px;color:var(--muted);white-space:nowrap;display:flex;align-items:center;gap:7px;justify-content:center;transition:.13s}
.cb:hover{border-color:var(--violet);color:var(--violet)}
.cb.pri{background:var(--grad2);color:#fff;border-color:transparent}
.cb.done{border-color:var(--green);color:#178a5a;background:rgba(32,184,120,.06);pointer-events:none}
.footnote{display:flex;align-items:center;gap:12px;background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:13px 17px;margin-top:14px;font-size:13px;color:var(--muted)}
.footnote .sp{flex:1}
.footnote button{font-weight:800;color:var(--violet);white-space:nowrap}

/* active series */
.acards{display:flex;flex-direction:column;gap:12px;margin-top:16px}
.acard{display:grid;grid-template-columns:auto 1.3fr 1fr 1fr auto;gap:16px;background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:17px;align-items:center;animation:fade .3s ease}
@media(max-width:1000px){.acard{grid-template-columns:auto 1fr}}
.acard .st b{display:block;font-size:15.5px;font-weight:900}
.acard .st span{font-size:12px;color:var(--muted)}
.hstat{font-size:11px;font-weight:800;border-radius:999px;padding:4px 11px;display:inline-block}
.h-ok{background:rgba(32,184,120,.1);color:#178a5a}
.h-low{background:rgba(245,165,36,.14);color:#b57708}
.h-paused{background:var(--surface-2);color:var(--faint)}
.astat{font-size:12.5px;color:var(--muted);line-height:1.6}
.astat b{color:var(--ink)}
.aacts{display:flex;gap:7px;flex-wrap:wrap;justify-content:flex-end}
.ab{border:1.5px solid var(--line);border-radius:9px;padding:7px 11px;font-weight:800;font-size:12px;color:var(--muted)}
.ab:hover{border-color:var(--violet);color:var(--violet)}

/* templates */
.tgrid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:13px;margin-top:16px}
@media(max-width:900px){.tgrid{grid-template-columns:1fr 1fr}}
.tcard{background:var(--surface);border:1px solid var(--line);border-radius:15px;padding:17px;display:flex;flex-direction:column;transition:.14s}
.tcard:hover{border-color:var(--violet);transform:translateY(-2px);box-shadow:var(--shadow-sm)}
.tcard .ti{width:42px;height:42px;border-radius:12px;display:grid;place-items:center;font-size:18px;margin-bottom:10px}
.tcard b{font-size:14.5px}
.tcard p{color:var(--muted);font-size:12px;margin-top:4px;flex:1;line-height:1.45}
.tcard .tm{display:flex;gap:6px;margin-top:9px;flex-wrap:wrap}
.tcard .tm span{font-size:10.5px;font-weight:700;color:var(--muted);background:var(--surface-2);border-radius:7px;padding:3px 8px}
.tcard button{margin-top:11px;font-weight:800;font-size:12.5px;color:var(--violet);text-align:left}
.tcard button:hover{text-decoration:underline}

/* right rail */
.rail{display:flex;flex-direction:column;gap:16px;padding-top:2px}
.rpanel{background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:17px;box-shadow:var(--shadow-sm)}
.rpanel h3{font-size:14.5px}
.rpanel .rsub{color:var(--muted);font-size:12px;margin:2px 0 12px}
.stratrow{display:flex;gap:11px;padding:8px 0;font-size:12.5px;line-height:1.45;color:var(--muted)}
.stratrow .si{width:32px;height:32px;border-radius:9px;display:grid;place-items:center;font-size:14px;flex-shrink:0}
.rlink{display:inline-flex;align-items:center;gap:6px;border:1.5px solid var(--line);border-radius:10px;padding:8px 13px;font-weight:800;font-size:12.5px;color:var(--violet);margin-top:8px}
.rlink:hover{border-color:var(--violet)}
.impact .ir{margin-bottom:12px}
.impact .il{display:flex;justify-content:space-between;font-size:12.5px;font-weight:700;color:var(--muted);margin-bottom:5px}
.impact .il b{color:var(--ink)}
.ibar{height:7px;border-radius:5px;background:var(--surface-2);overflow:hidden;display:flex}
.ibar i{height:100%;transition:width .5s ease}
.bestcard{display:flex;align-items:center;gap:11px;border:1px solid rgba(128,61,255,.25);background:rgba(128,61,255,.04);border-radius:13px;padding:12px;cursor:pointer}
.bestcard .cicon{width:38px;height:38px;font-size:16px}
.bestcard b{display:block;font-size:13.5px}
.bestcard span{font-size:11px;color:var(--muted)}
.bfit{margin-left:auto;font-size:10px;font-weight:800;color:var(--violet);background:rgba(128,61,255,.12);border-radius:7px;padding:3px 8px}
.bwhy{font-size:12px;color:var(--muted);margin-top:10px;line-height:1.5}
.reserve{background:linear-gradient(120deg,rgba(128,61,255,.08),rgba(59,130,246,.05));border:1px solid rgba(128,61,255,.18)}
.reserve .rn{font-size:11px;font-weight:800;color:var(--violet);background:rgba(128,61,255,.12);border-radius:999px;padding:3px 10px;float:right}

/* activation modal */
.overlay{position:fixed;inset:0;background:rgba(15,23,42,.45);backdrop-filter:blur(3px);z-index:60;display:none;align-items:flex-start;justify-content:center;padding:44px 20px;overflow-y:auto}
.overlay.on{display:flex}
.modal{background:var(--surface);border-radius:20px;box-shadow:var(--shadow);width:100%;max-width:560px;padding:24px;animation:pop .25s ease}
@keyframes pop{from{opacity:0;transform:translateY(14px) scale(.98)}to{opacity:1;transform:none}}
.modal h3{font-size:18px;display:flex;align-items:center;gap:9px}
.modal .msub{color:var(--muted);font-size:13px;margin:3px 0 16px}
.mf{margin-bottom:13px}
.mf label{display:block;font-weight:700;font-size:12.5px;margin-bottom:6px}
.mf input,.mf select{width:100%;border:1.5px solid var(--line);border-radius:11px;padding:11px 13px;font-size:14px;outline:none;background:var(--surface);color:var(--ink);font-weight:600}
.mrow{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.autos{border:1px solid var(--line-2);border-radius:13px;padding:13px 15px;margin-bottom:14px}
.autos h6{font-size:11px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;color:var(--faint);margin-bottom:8px}
.autos label{display:flex;align-items:center;gap:9px;font-weight:600;font-size:13px;padding:5px 0}
.autos input{accent-color:var(--violet);width:16px;height:16px}
.mimpact{background:var(--surface-2);border-radius:13px;padding:13px 15px;font-size:12.5px;color:var(--muted);line-height:1.7;margin-bottom:14px}
.mimpact b{color:var(--ink)}
.macts{display:flex;gap:10px;margin-top:6px}
.macts .grow{flex:1}
.mbtn{padding:12px 18px;border-radius:11px;font-weight:800;font-size:14px}
.mbtn.pri{background:var(--grad2);color:#fff}
.mbtn.ghost{color:var(--muted)}

.toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(12px);background:var(--slate);color:#fff;font-weight:700;font-size:14px;padding:12px 18px;border-radius:12px;box-shadow:var(--shadow);opacity:0;pointer-events:none;transition:.25s;z-index:95;display:flex;align-items:center;gap:12px;max-width:90vw}
.toast.show{opacity:1;pointer-events:auto;transform:translateX(-50%) translateY(0)}
.toast button{color:var(--cyan);font-weight:800}
svg.defs{position:absolute;width:0;height:0}
</style>
</head>
<body>
<svg class="defs"><defs><linearGradient id="tl" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#803DFF"/><stop offset=".55" stop-color="#3B82F6"/><stop offset="1" stop-color="#22D3EE"/></linearGradient></defs></svg>

<div class="app">
  <aside class="sidebar">
    <div class="logo"><span class="mark" id="lmark"></span>Threadline</div>
    <nav class="nav" id="nav"></nav>
    <div class="sfoot">
      <div class="wsrow" onclick="toast('Workspace switcher — prototype')"><div class="avv" id="wsav">TB</div><div class="wt"><b id="wsname">Workspace</b><span>Workspace</span></div></div>
      <div class="wsrow" onclick="toast('Profile — prototype')"><div class="avv round" style="background:linear-gradient(135deg,#fb7185,#f5a524)">K</div><div class="wt"><b>Kennady Scott</b><span>Admin</span></div></div>
      <button class="setrow" onclick="location.href='threadline-settings.html'">⚙︎ Settings</button>
    </div>
  </aside>

  <div class="main">
    <div class="topbar">
      <button class="bell" onclick="toast('3 notifications')">🔔<i>3</i></button>
      <button class="newspark" onclick="toast('New Spark — available on every page')">＋ New Spark</button>
    </div>

    <div class="content">
      <div class="colmain">
        <div class="greet"><h1>Series Generator <span style="font-size:20px">✦</span></h1><p>Turn one strong topic into a recurring content series.</p></div>
        <div class="tabs" id="tabs"></div>
        <div id="view"></div>
      </div>
      <div class="rail" id="rail"></div>
    </div>
  </div>
</div>

<div class="overlay" id="actOverlay"><div class="modal">
  <h3>✦ Activate <span id="am-name-h" class="grad-text"></span></h3>
  <p class="msub">Review the setup — nothing is irreversible. You can pause, edit, or undo anytime.</p>
  <div class="mrow">
    <div class="mf"><label>Series name</label><input id="am-name"></div>
    <div class="mf"><label>Pillar</label><select id="am-pillar"></select></div>
  </div>
  <div class="mrow">
    <div class="mf"><label>Cadence</label><select id="am-cad"><option>Weekly</option><option>Biweekly</option><option>Twice monthly</option><option>Monthly</option></select></div>
    <div class="mf"><label>Preferred day</label><select id="am-day"><option>Wednesday</option><option>Monday</option><option>Tuesday</option><option>Thursday</option><option>Friday</option></select></div>
  </div>
  <div class="autos"><h6>Automation</h6>
    <label><input type="checkbox" checked> Automatically create future Plan slots</label>
    <label><input type="checkbox" checked> Suggest topics from Spark Bank &amp; reserve</label>
    <label><input type="checkbox" checked> Maintain a minimum idea reserve (pause when empty)</label>
    <label><input type="checkbox"> Require my review before topics are assigned</label>
  </div>
  <div class="mimpact" id="am-impact"></div>
  <div class="macts"><button class="mbtn ghost" onclick="closeAct()">Cancel</button><div class="grow"></div><button class="mbtn pri" onclick="confirmAct()">Activate Series</button></div>
</div></div>

<script src="threadline-brand.js"></script>
<script src="threadline-preview.js"></script>
<script>
const $=s=>document.querySelector(s);
const el=(t,c,h)=>{const e=document.createElement(t);if(c)e.className=c;if(h!=null)e.innerHTML=h;return e;};
const esc=s=>(s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const MARK='<svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg"><defs><linearGradient id="tlm" x1="6" y1="6" x2="34" y2="34" gradientUnits="userSpaceOnUse"><stop stop-color="#803DFF"/><stop offset=".55" stop-color="#3B82F6"/><stop offset="1" stop-color="#22D3EE"/></linearGradient></defs><g stroke="url(#tlm)" stroke-width="3.2" stroke-linecap="round"><path d="M9 10 H31"/><path d="M9 10 V17"/><path d="M31 10 V17"/><path d="M20 10 V31"/></g><g fill="url(#tlm)"><circle cx="9" cy="10" r="2.7"/><circle cx="31" cy="10" r="2.7"/><circle cx="20" cy="31" r="2.7"/></g></svg>';
$('#lmark').innerHTML=MARK;
document.head.insertAdjacentHTML('beforeend','<style>.grad-text{background:var(--grad2);-webkit-background-clip:text;background-clip:text;color:transparent}</style>');

const B=(window.loadBrand&&loadBrand())||defaultBrand();
const lc=s=>{s=(s||'').trim();return s?s.charAt(0).toLowerCase()+s.slice(1):s;};
const strip=s=>(s||'').replace(/<[^>]+>/g,'');
$('#wsname').textContent=B.name;
$('#wsav').textContent=B.name.split(/\s+/).map(w=>w[0]).join('').slice(0,2).toUpperCase();
const POV_PILLAR=(B.pillars.find(p=>/view|talk|pov|perspective/i.test(p[0]))||B.pillars[B.pillars.length-1])[0];
const BTS_PILLAR=(B.pillars.find(p=>/behind|process|work/i.test(p[0]))||B.pillars[1]||B.pillars[0])[0];
const PROOF_PILLAR=(B.pillars.find(p=>/proof|result|win/i.test(p[0]))||B.pillars[Math.min(2,B.pillars.length-1)])[0];
const EDU_PILLAR=B.pillars[0][0];
const AUD_SHORT=strip(B.audience.primary).split(',')[0].replace(/\.$/,'');

/* nav */
const NAV=[['🏠','Home','Your content command center',0,'threadline-app-home.html'],['📅','Plan','Plan, create, and publish',0,'threadline-plan.html'],['⚡','Spark Bank','Your idea library',0,'threadline-spark-bank.html'],['✎','Build','Think, create, build',0,'threadline-build-page.html'],['🧵','Series','Create recurring impact',1,''],['📊','Analytics','Measure what matters',0,'threadline-analytics.html']];
$('#nav').innerHTML=NAV.map(([ic,l,d,on,href])=>`<button class="nitem${on?' on':''}" onclick="${href?`location.href='${href}'`:(on?'':`toast('${l} — coming in the next prototype')`)}"><b><span class="ic">${ic}</span>${l}</b><span>${d}</span></button>`).join('');

/* ---------- data ---------- */
const ACTIVE=B.series.slice(0,3).map((s,i)=>({name:s[0],cad:(s[1]||'Weekly ·').split('·')[0].trim(),pillar:s[3]||EDU_PILLAR,desc:s[2],next:['Wed, Jul 15','Fri, Jul 17','Mon, Jul 20'][i],reserve:[5,2,6][i],published:[12,7,9][i],health:['h-ok','h-low','h-ok'][i],hlabel:['On track','Reserve low','On track'][i],paused:0}));
const CONCEPTS=[
  {icon:'👓',bg:'rgba(128,61,255,.1)',name:'Founder POV',pillar:POV_PILLAR,ptag:'pt-v',cad:'Weekly',
   desc:'Unfiltered perspectives, lessons, and frameworks from the founder’s seat.',
   eps:['3 beliefs I’ve outgrown','What I’m testing this month','My weekly reset ritual'],
   why:'Positions you as a thought leader and builds strong audience connection.',best:1,effort:'Easy to maintain'},
  {icon:'🧰',bg:'rgba(245,165,36,.14)',name:'Behind the Work',pillar:BTS_PILLAR,ptag:'pt-a',cad:'Biweekly',
   desc:'A look behind the scenes at how we build, create, and solve problems.',
   eps:['How we build a plan','Tools we actually use','Mistakes that made us better'],
   why:'Your brand emphasizes transparency — this proves it with real examples.',effort:'Moderate lift'},
  {icon:'👥',bg:'rgba(32,184,120,.12)',name:'Client Story',pillar:PROOF_PILLAR,ptag:'pt-g',cad:'Biweekly',
   desc:'Real client wins, challenges, and what changed along the way.',
   eps:['From stuck to scaling: Client X','One change, big results','Lessons from a tough project'],
   why:'Your current mix is light on proof — this closes the gap.',effort:'Moderate lift'},
  {icon:'❌',bg:'rgba(34,211,238,.14)',name:'Myth Monday',pillar:EDU_PILLAR,ptag:'pt-c',cad:'Weekly',
   desc:'Breaking common myths so '+lc(AUD_SHORT)+' can make smarter decisions.',
   eps:['Myth: You need to be everywhere','Myth: More effort fixes everything','Myth: Complexity means quality'],
   why:'Myth-busting fits your direct voice and is endlessly repeatable.',
   warn: (B.series.some(s=>/myth/i.test(s[0]))?'Overlaps with an existing series — consider merging or differentiating.':null),effort:'Easy to maintain'},
];
CONCEPTS.forEach((c,i)=>{ c.id=i; c.state='new'; });
const TEMPLATES=[
  ['❓','rgba(128,61,255,.1)','Ask the Expert','Answer recurring audience questions while building authority.','Question → Answer → Nuance → Next step',['Q&A','Weekly','Low effort']],
  ['🔍','rgba(59,130,246,.1)','Myth vs. Reality','Correct a common misconception your audience believes.','Myth → Why it spreads → Truth → Takeaway',['Education','Weekly','Low effort']],
  ['📈','rgba(32,184,120,.12)','The Case File','One client story per installment — challenge, change, result.','Before → What we did → After → Lesson',['Proof','Biweekly','Medium']],
  ['🧭','rgba(245,165,36,.14)','Behind the Decision','Explain why you made a specific strategic choice.','Problem → Options → Choice → Why → Outcome',['BTS','Biweekly','Medium']],
  ['💬','rgba(34,211,238,.14)','You Asked. We Answered.','Turn real customer language into helpful content.','Their words → The real question → Our answer',['Community','Weekly','Low effort']],
  ['🗓️','rgba(251,113,133,.12)','The Weekly Reset','A short recurring reflection your audience can rely on.','One insight → One action → One question',['Connection','Weekly','Low effort']],
];

/* ---------- tabs ---------- */
let tab='gen', generated=true;
const TABS=[['gen','Generator'],['active','Active series'],['tpl','Templates']];
function renderTabs(){ $('#tabs').innerHTML=TABS.map(([k,l])=>`<button class="tab${tab===k?' on':''}" onclick="setTab('${k}')">${l}${k==='active'?` <span class="n">${ACTIVE.length}</span>`:''}</button>`).join(''); }
function setTab(k){ tab=k; render(); }

/* ---------- generator view ---------- */
function genView(){
  const topic='Helping '+lc(AUD_SHORT)+' get '+(strip(B.positioning.achieve)?lc(strip(B.positioning.achieve)).replace(/\.$/,''):'real results without the overwhelm');
  return `<div class="genbox">
    <div class="grow2">
      <div class="gf"><label>Topic / Theme</label><textarea id="g-topic">${esc(topic)}</textarea></div>
      <div class="gf"><label>Goal</label><select><option>Build trust &amp; authority</option><option>Educate</option><option>Show proof</option><option>Create connection</option><option>Support an offer</option></select></div>
      <div class="gf"><label>Audience</label><select><option>${esc(AUD_SHORT)}</option><option>Secondary audience</option><option>Custom…</option></select></div>
    </div>
    <div class="grow3">
      <div class="gf"><label>Preferred formats</label><select><option>Carousel, short video, text</option><option>Short-form video</option><option>Text posts</option><option>Mixed — let Threadline pick</option></select></div>
      <div class="gf"><label>Cadence</label><select><option>Weekly</option><option>Biweekly</option><option>Monthly</option><option>Let Threadline recommend</option></select></div>
      <div class="gf"><label>Content pillar</label><select><option>Let Threadline suggest</option>${B.pillars.map(p=>`<option>${p[0]}</option>`).join('')}</select></div>
      <button class="genbtn" onclick="generate()">✦ Generate series ideas</button>
    </div>
  </div>
  <div class="reflect" id="reflect"></div>
  <div class="thinking" id="think"><span>Threadline is designing series directions</span><span class="dots"><i></i><i></i><i></i></span></div>
  <div id="results">${generated?resultsHTML():''}</div>`;
}
function resultsHTML(){
  return `<div class="reshead"><h3>${CONCEPTS.length} series ideas generated</h3><span class="mix">Great mix!</span><span class="sp"></span>
    <button class="rl" onclick="regenerate()">↻ Regenerate</button><button class="rl" onclick="toast('Customize: edit names, cadence, patterns & pillars')" style="margin-left:14px">⚙ Customize</button></div>
  <div class="concepts">${CONCEPTS.map(conceptHTML).join('')}</div>
  <div class="footnote">✦ <span>These are just starting points. You can refine titles, adjust cadences, or swap formats anytime.</span><span class="sp"></span><button onclick="toast('Refine all: one instruction applies across every concept')">Refine all series ›</button></div>`;
}
function conceptHTML(c){
  return `<div class="concept${c.state==='active'?' active-done':''}" data-c="${c.id}">
    <div class="cicon" style="background:${c.bg}">${c.icon}</div>
    <div><div class="cname">${c.name} <span class="ptag ${c.ptag}">${c.pillar}</span></div>
      <div class="cdesc">${c.desc}</div>${c.warn?`<div class="cwarn">⚠ ${c.warn}</div>`:''}</div>
    <div><div class="cmeta"><h6>Cadence</h6><div class="cv">${c.cad}</div></div>
      <div class="cmeta"><h6>Formats</h6><div class="fchips"><i class="f1">▤</i><i class="f2">▶</i><i class="f3">☰</i></div></div>
      <div class="cmeta"><h6>Effort</h6><div class="cv" style="font-size:12px;color:var(--muted)">${c.effort}</div></div></div>
    <div class="eps"><h6>Sample episode ideas</h6><ul>${c.eps.map(e=>`<li>${esc(e)}</li>`).join('')}</ul></div>
    <div class="cacts">
      ${c.state==='active'?`<button class="cb done">✓ Activated</button>`:`<button class="cb pri" onclick="openAct(${c.id})">▶ Activate series</button>`}
      ${c.state==='draft'?`<button class="cb done">✓ Draft saved</button>`:`<button class="cb" onclick="saveDraft(${c.id})">🔖 Save draft</button>`}
      <button class="cb" onclick="toast('Plan preview: ${c.name} adds ${c.cad==='Weekly'?'4':'2'} pieces/month — pillar balance stays even')">📅 Add to Planner</button>
    </div>
  </div>`;
}
function generate(){
  const t=$('#g-topic').value.trim();
  $('#results').innerHTML=''; $('#reflect').classList.remove('on'); $('#think').classList.add('on');
  setTimeout(()=>{
    $('#think').classList.remove('on');
    $('#reflect').innerHTML=`This topic has strong potential — it connects directly to ${lc(AUD_SHORT)}’s need for ${/simpl|clear|clarit/i.test(t)?'clarity':'a clear path forward'}. I designed four directions that do <b>different jobs</b>: point of view, behind-the-scenes, proof, and education. A strong mix avoids four versions of the same idea.`;
    $('#reflect').classList.add('on');
    generated=true; $('#results').innerHTML=resultsHTML(); renderRail();
  },1300);
}
function regenerate(){
  // rotate sample episodes to feel fresh
  CONCEPTS.forEach(c=>c.eps.push(c.eps.shift()));
  $('#results').innerHTML=''; $('#think').classList.add('on');
  setTimeout(()=>{ $('#think').classList.remove('on'); $('#results').innerHTML=resultsHTML(); toast('Regenerated — same strategic mix, fresh episode ideas'); },900);
}
function saveDraft(id){ CONCEPTS[id].state='draft'; render(); toast('Saved as draft — find it here anytime'); }

/* ---------- activation ---------- */
let actId=null;
function openAct(id){ actId=id; const c=CONCEPTS[id];
  $('#am-name-h').textContent=c.name; $('#am-name').value=c.name;
  $('#am-pillar').innerHTML=B.pillars.map(p=>`<option${p[0]===c.pillar?' selected':''}>${p[0]}</option>`).join('');
  $('#am-cad').value=c.cad==='Biweekly'?'Biweekly':'Weekly';
  const slots=c.cad==='Weekly'?4:2;
  $('#am-impact').innerHTML=`<b>Plan impact:</b> fills <b>1 ${c.cad.toLowerCase()} slot</b> (~${slots} pieces/month) · pillar balance stays <b>even</b> · production: <b>${c.effort.toLowerCase()}</b> · Threadline adds <b>6 starter ideas</b> to the reserve and creates recurring slots for the next 8 weeks.`;
  $('#actOverlay').classList.add('on');
}
function closeAct(){ $('#actOverlay').classList.remove('on'); }
function confirmAct(){
  const c=CONCEPTS[actId]; c.state='active';
  const nm=$('#am-name').value.trim()||c.name;
  ACTIVE.push({name:nm,cad:$('#am-cad').value,pillar:$('#am-pillar').value,desc:c.desc,next:'Wed, Jul 15',reserve:6,published:0,health:'h-ok',hlabel:'Just activated',paused:0});
  closeAct(); render();
  toastUndo(`${nm} is active — 6 starter ideas added, recurring slots created for 8 weeks`,()=>{ c.state='new'; ACTIVE.pop(); render(); });
}

/* ---------- active series view ---------- */
function activeView(){
  return `<div class="acards">${ACTIVE.map((a,i)=>`<div class="acard">
    <div class="cicon" style="background:rgba(128,61,255,.08)">🧵</div>
    <div class="st"><b>${esc(a.name)}</b><span>${a.cad} · ${esc(a.pillar)}</span>
      <div style="margin-top:6px"><span class="hstat ${a.paused?'h-paused':a.health}">${a.paused?'⏸ Paused':a.hlabel}</span></div></div>
    <div class="astat">Next: <b>${a.paused?'—':a.next}</b><br>Reserve: <b>${a.reserve} ideas</b>${a.reserve<=2?' ⚠':''}</div>
    <div class="astat">Published: <b>${a.published} installments</b><br>Formats: <b>Mixed</b></div>
    <div class="aacts">
      <button class="ab" onclick="toast('Opening series detail — upcoming, reserve & insights')">Open</button>
      <button class="ab" onclick="ACTIVE[${i}].reserve++;render();toast('Idea added to reserve')">＋ Add idea</button>
      <button class="ab" onclick="location.href='threadline-plan.html'">View in Plan</button>
      <button class="ab" onclick="ACTIVE[${i}].paused=ACTIVE[${i}].paused?0:1;render();toast(ACTIVE[${i}].paused?'Paused — future slots on hold, history preserved':'Resumed — recurring slots restored')">${a.paused?'▶ Resume':'⏸ Pause'}</button>
    </div>
  </div>`).join('')}</div>
  ${ACTIVE.some(a=>a.reserve<=2)?`<div class="footnote">⚠ <span><b>${esc((ACTIVE.find(a=>a.reserve<=2)||{}).name)}</b> is running low — ${(ACTIVE.find(a=>a.reserve<=2)||{}).reserve} ideas left in reserve. Let’s build a few more before next month.</span><span class="sp"></span><button onclick="location.href='threadline-build-page.html?mode=idea'">Fill reserve with Build ›</button></div>`:''}`;
}

/* ---------- templates view ---------- */
function tplView(){
  return `<div class="tgrid">${TEMPLATES.map(t=>`<div class="tcard"><div class="ti" style="background:${t[1]}">${t[0]}</div><b>${t[2]}</b><p>${t[3]}</p>
    <div class="tm">${t[5].map(x=>`<span>${x}</span>`).join('')}</div>
    <div class="tm"><span style="background:rgba(128,61,255,.07);color:var(--violet)">${t[4]}</span></div>
    <button onclick="useTemplate('${esc(t[2])}')">Customize this template →</button></div>`).join('')}</div>
  <div class="footnote">✦ <span>Templates are starting points — Threadline renames and adapts them to your brand rather than activating something generic.</span></div>`;
}
function useTemplate(name){ tab='gen'; render(); $('#g-topic').value='A recurring “'+name+'” series adapted to '+B.name+'’s voice and audience'; toast('Template loaded — adjust the topic and generate'); window.scrollTo({top:0,behavior:'smooth'}); }

/* ---------- right rail ---------- */
function renderRail(){
  const filled=Math.min(7,3+ACTIVE.filter(a=>!a.paused).length);
  const monthly=ACTIVE.filter(a=>!a.paused).reduce((n,a)=>n+(a.cad==='Weekly'?4:2),4);
  $('#rail').innerHTML=`
  <div class="rpanel"><h3>Series strategy</h3><p class="rsub">How these series work together.</p>
    <div class="stratrow"><div class="si" style="background:rgba(128,61,255,.1)">✦</div><div>Balanced mix of <b>point of view, behind-the-scenes, proof, and education</b>.</div></div>
    <div class="stratrow"><div class="si" style="background:rgba(245,165,36,.14)">🧡</div><div>Strong founder voice with social proof to back it up.</div></div>
    <div class="stratrow"><div class="si" style="background:rgba(32,184,120,.12)">🗓</div><div>Cadence fits your stated capacity — no production crunch.</div></div>
    <button class="rlink" onclick="toast('Strategy map: how pillars → series → slots connect')">View series strategy map →</button>
  </div>
  <div class="rpanel impact"><h3>Planner impact</h3><p class="rsub">Estimated impact on your Plan.</p>
    <div class="ir"><div class="il"><span>Weekly slots filled</span><b>${filled} / 7</b></div><div class="ibar"><i style="width:${filled/7*100}%;background:var(--grad2)"></i></div></div>
    <div class="ir"><div class="il"><span>Monthly content pieces</span><b>${monthly}</b></div><div class="ibar"><i style="width:${Math.min(100,monthly*4)}%;background:var(--grad2)"></i></div></div>
    <div class="ir"><div class="il"><span>Pillar balance</span><b style="color:#178a5a">Balanced</b></div><div class="ibar">${B.pillars.map((p,i)=>`<i style="width:${100/B.pillars.length}%;background:${p[1]}"></i>`).join('')}</div></div>
    <button class="rlink" onclick="toast('Planner preview — recurring slots across the next 8 weeks')">See planner preview →</button>
  </div>
  <div class="rpanel"><h3>Best series match</h3><p class="rsub">Top performer for your goals.</p>
    <div class="bestcard" onclick="openAct(0)"><div class="cicon" style="background:rgba(128,61,255,.1)">👓</div><div><b>Founder POV</b><span>High potential for trust &amp; authority.</span></div><span class="bfit">Best fit</span></div>
    <div class="bwhy"><b>Why it’s a great fit</b><br>Positions you as a thought leader and builds strong audience connection.</div>
  </div>
  <div class="rpanel reserve"><span class="rn">12 ideas</span><h3>Starter episode reserve</h3><p class="rsub">Kickstart your new series.</p>
    <div style="font-size:12.5px;color:var(--muted);line-height:1.5">AI-generated episode ideas are ready to add to your Plan.</div>
    <button class="rlink" onclick="toast('Episode ideas — sourced from Spark Bank + your brand foundation')">View episode ideas →</button>
  </div>`;
}

/* ---------- render ---------- */
function render(){ renderTabs();
  $('#view').innerHTML = tab==='gen'?genView() : tab==='active'?activeView() : tplView();
  renderRail();
}

/* toast */
function toast(msg){ toastUndo(msg,null); }
function toastUndo(msg,undo){ let t=document.getElementById('toast'); if(!t){ t=el('div','toast'); t.id='toast'; document.body.appendChild(t); }
  t.innerHTML=esc(msg)+(undo?' <button id="undoB">Undo</button>':''); if(undo) t.querySelector('#undoB').onclick=()=>{ undo(); t.classList.remove('show'); };
  t.classList.add('show'); clearTimeout(t._h); t._h=setTimeout(()=>t.classList.remove('show'),undo?4500:2600); }

(function(){ const t=new URLSearchParams(location.search).get('tab'); if(t&&TABS.some(x=>x[0]===t)) tab=t; })();
render();
</script>
<script>
/* mobile drawer nav */
(function(){
  var app=document.querySelector('.app'); if(!app) return;
  var tb=app.querySelector('.topbar'); if(!tb) return;
  var btn=document.createElement('button');
  btn.className='hamb'; btn.setAttribute('aria-label','Open menu'); btn.textContent='\u2630';
  btn.addEventListener('click',function(){ app.classList.toggle('nav-open'); });
  tb.insertBefore(btn,tb.firstChild);
  var scrim=document.createElement('div'); scrim.className='scrim';
  scrim.addEventListener('click',function(){ app.classList.remove('nav-open'); });
  app.appendChild(scrim);
  var sb=app.querySelector('.sidebar');
  if(sb) sb.addEventListener('click',function(e){
    if(e.target.closest('a,button,.wsrow')) setTimeout(function(){ app.classList.remove('nav-open'); },150);
  });
  document.addEventListener('keydown',function(e){ if(e.key==='Escape') app.classList.remove('nav-open'); });
})();
</script>
</body>
</html>
