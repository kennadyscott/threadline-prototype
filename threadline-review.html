<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Threadline — Brand Reveal</title>
<link rel="preconnect" href="https://api.fontshare.com" crossorigin>
<link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700,900&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#0f172a;--muted:#54607a;--faint:#8b96ad;
  --line:#e6e9f1;--line-2:#eef1f7;--bg:#f7f8fb;--surface:#ffffff;--surface-2:#f2f4f9;--slate:#0f172a;
  --violet:#803dff;--blue:#3b82f6;--cyan:#22d3ee;--coral:#fb7185;
  --green:#20b878;--amber:#f5a524;
  --grad2:linear-gradient(135deg,#803dff,#3b82f6);
  --shadow:0 18px 50px rgba(20,20,60,.10);--shadow-sm:0 4px 16px rgba(20,20,60,.06);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Satoshi',system-ui,-apple-system,sans-serif;color:var(--ink);min-height:100vh;background:var(--bg);-webkit-font-smoothing:antialiased;line-height:1.5}
h1,h2,h3,h4{font-family:'Satoshi';font-weight:900;letter-spacing:-.02em;line-height:1.1}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
textarea{font-family:inherit}
.grad-text{background:var(--grad2);-webkit-background-clip:text;background-clip:text;color:transparent}
.mark{width:24px;height:24px;flex-shrink:0;display:inline-block}.mark svg{width:100%;height:100%;display:block}

/* header */
.top{position:sticky;top:0;z-index:30;background:rgba(247,248,251,.92);backdrop-filter:blur(10px);border-bottom:1px solid var(--line-2)}
.topin{display:flex;align-items:center;gap:12px;padding:12px 24px;max-width:1120px;margin:0 auto}
.brand{display:flex;align-items:center;gap:9px;font-weight:900;font-size:16px}
.brand .tagd{color:var(--faint);font-weight:600;font-size:13px;border-left:1px solid var(--line);padding-left:12px;margin-left:2px}
.toptime{margin-left:auto;color:var(--faint);font-weight:700;font-size:12.5px}

/* reveal shell */
.wrap{max-width:1000px;margin:0 auto;padding:46px 28px 170px}
.section-label{display:flex;align-items:center;gap:10px;margin:52px 0 16px;font-size:12px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--violet)}
.section-label::after{content:'';flex:1;height:1px;background:var(--line)}
.slide{animation:rise .5s ease both}
@keyframes rise{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}

/* hero */
.hero{text-align:center;padding:34px 0 8px}
.hero .kick{font-size:12.5px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;color:var(--violet)}
.hero .biglogo{width:110px;height:110px;margin:24px auto 6px;border-radius:26px;background:var(--surface);border:1px solid var(--line);box-shadow:var(--shadow);display:grid;place-items:center;padding:18px}
.hero .biglogo img,.hero .biglogo svg{width:100%;height:100%;object-fit:contain}
.hero h1{font-size:clamp(38px,6vw,58px);margin-top:16px;text-wrap:balance}
.hero .tagline{font-size:clamp(16px,2.4vw,21px);font-weight:700;color:var(--muted);margin-top:8px}
.hero .sub{color:var(--faint);font-size:14px;margin-top:14px}

/* POV */
.pov{margin-top:38px;background:linear-gradient(120deg,rgba(128,61,255,.08),rgba(59,130,246,.05) 55%,rgba(34,211,238,.05));border:1px solid rgba(128,61,255,.25);border-radius:22px;padding:28px 30px;text-align:center}
.pov h3{font-size:12.5px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--violet);display:flex;align-items:center;justify-content:center;gap:8px}
.pov .statement{font-size:clamp(19px,2.8vw,26px);font-weight:900;line-height:1.35;margin:14px auto 0;max-width:44ch;text-wrap:balance}
.pov .from{color:var(--faint);font-size:12.5px;font-weight:700;margin-top:16px}
.pov .chips{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:10px}
.pov .chips span{background:var(--surface);border:1px solid var(--line);border-radius:999px;padding:6px 14px;font-weight:700;font-size:12.5px;color:var(--muted)}

/* big idea */
.bigidea{background:var(--surface);border:1px solid var(--line);border-radius:22px;box-shadow:var(--shadow-sm);padding:30px 32px;text-align:center}
.bigidea .oneline{font-size:clamp(18px,2.6vw,24px);font-weight:800;line-height:1.4;max-width:52ch;margin:0 auto;text-wrap:balance}
.bigidea .facts{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin-top:18px}
.bigidea .facts span{background:var(--surface-2);border-radius:999px;padding:7px 15px;font-weight:700;font-size:12.5px;color:var(--muted)}
.bigidea .facts b{color:var(--ink)}

/* mini trio */
.trio{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-top:14px}
@media(max-width:820px){.trio{grid-template-columns:1fr}}
.mini{background:var(--surface);border:1px solid var(--line);border-radius:18px;padding:22px;box-shadow:var(--shadow-sm)}
.mini .mi{width:38px;height:38px;border-radius:12px;display:grid;place-items:center;font-size:17px;margin-bottom:12px}
.mini h4{font-size:11.5px;font-weight:800;letter-spacing:.07em;text-transform:uppercase;color:var(--faint);margin-bottom:8px}
.mini p{font-size:15.5px;font-weight:700;line-height:1.5}

/* shift */
.shift{display:grid;grid-template-columns:1fr auto 1fr;gap:14px;align-items:stretch;margin-top:14px}
@media(max-width:640px){.shift{grid-template-columns:1fr}.shift .arr{transform:rotate(90deg)}}
.shift .tb{border-radius:18px;padding:20px;text-align:center;display:flex;flex-direction:column;justify-content:center}
.shift .from{background:rgba(251,113,133,.07);border:1px solid rgba(251,113,133,.18)}
.shift .to{background:rgba(32,184,120,.07);border:1px solid rgba(32,184,120,.18)}
.shift .tl{font-size:11px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:var(--faint);margin-bottom:6px}
.shift .tv{font-weight:900;font-size:19px;line-height:1.3}
.shift .arr{align-self:center;font-size:24px;color:var(--violet);font-weight:900}

/* voice */
.voicegrid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:820px){.voicegrid{grid-template-columns:1fr}}
.vcard{background:var(--surface);border:1px solid var(--line);border-radius:18px;padding:22px;box-shadow:var(--shadow-sm)}
.vcard h4{font-size:11.5px;font-weight:800;letter-spacing:.07em;text-transform:uppercase;color:var(--faint);margin-bottom:12px}
.traits{display:flex;gap:9px;flex-wrap:wrap;justify-content:center;margin:6px 0 2px}
.traits span{background:rgba(128,61,255,.08);border:1px solid rgba(128,61,255,.2);color:var(--violet);border-radius:999px;padding:9px 20px;font-weight:800;font-size:16px}
.gut{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:560px){.gut{grid-template-columns:1fr}}
.gut .col{border-radius:14px;padding:14px 16px}
.gut .yes{background:rgba(32,184,120,.06);border:1px solid rgba(32,184,120,.18)}
.gut .no{background:rgba(251,113,133,.05);border:1px solid rgba(251,113,133,.16)}
.gut h5{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px}
.gut .yes h5{color:#178a5a}.gut .no h5{color:#c83a56}
.gut p{font-size:13.5px;padding:5px 0;line-height:1.4;font-weight:600}
.speech{background:var(--surface-2);border-radius:14px;padding:16px;margin-bottom:10px}
.speech .sl{font-size:10.5px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;color:var(--faint);margin-bottom:6px}
.speech .head{font-weight:900;font-size:18px;line-height:1.25}
.speech .cap{font-size:14px;line-height:1.55;font-weight:500}
.ctachip{display:inline-block;background:var(--grad2);color:#fff;font-weight:800;font-size:13px;padding:9px 16px;border-radius:10px}

/* themes */
.themes{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
@media(max-width:720px){.themes{grid-template-columns:1fr}}
.theme{background:var(--surface);border:1px solid var(--line);border-radius:18px;padding:20px 22px;box-shadow:var(--shadow-sm);border-top:4px solid var(--violet)}
.theme h4{font-size:16.5px;display:flex;align-items:center;justify-content:space-between;gap:8px}
.theme .pct{font-size:12px;font-weight:800;color:var(--violet);background:rgba(128,61,255,.08);border-radius:999px;padding:3px 10px}
.theme p{color:var(--muted);font-size:13.5px;margin-top:6px}
.theme .topics{margin-top:12px;display:flex;flex-direction:column;gap:6px}
.theme .topics span{font-size:12.5px;font-weight:700;color:var(--ink);background:var(--surface-2);border-radius:9px;padding:7px 11px}
.theme .topics span::before{content:'✦ ';color:var(--violet)}

/* recommendation */
.reco{margin-top:14px;background:var(--slate);color:#fff;border-radius:22px;padding:28px 30px;position:relative;overflow:hidden}
.reco::after{content:'';position:absolute;top:-40px;right:-40px;width:180px;height:180px;border-radius:50%;background:radial-gradient(circle,rgba(128,61,255,.35),transparent 70%)}
.reco h4{font-size:11.5px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:#b9a7ff;margin-bottom:10px}
.reco p{font-size:17px;font-weight:700;line-height:1.55;max-width:60ch;position:relative;z-index:1}

/* editing */
.editing [data-b]{outline:2px dashed rgba(128,61,255,.5);outline-offset:3px;border-radius:6px;cursor:text}

/* footer */
.foot{position:fixed;left:0;right:0;bottom:0;z-index:40;background:rgba(255,255,255,.94);backdrop-filter:blur(10px);border-top:1px solid var(--line)}
.footin{max-width:1000px;margin:0 auto;padding:12px 24px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.fnote{color:var(--faint);font-size:11.5px;font-weight:600;flex-basis:100%;text-align:center;margin-top:2px}
.fbtn{border:1.5px solid var(--line);border-radius:11px;padding:11px 17px;font-weight:800;font-size:13.5px;color:var(--muted);background:var(--surface)}
.fbtn:hover{border-color:var(--violet);color:var(--violet)}
.fbtn.on{border-color:var(--violet);color:var(--violet);background:rgba(128,61,255,.06)}
.approve{margin-left:auto;background:var(--grad2);color:#fff;font-weight:800;font-size:15px;padding:13px 26px;border-radius:12px;box-shadow:0 10px 26px rgba(128,61,255,.3)}
.approve:hover{filter:brightness(1.06)}
@media(max-width:640px){.approve{margin-left:0;width:100%}}

/* discuss drawer */
.discuss{position:fixed;right:22px;bottom:86px;width:min(360px,calc(100vw - 32px));background:var(--surface);border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow);padding:16px;z-index:45;display:none}
.discuss.on{display:block;animation:rise .25s ease}
.discuss h5{font-size:14px;display:flex;align-items:center;gap:8px}
.discuss textarea{width:100%;border:1.5px solid var(--line);border-radius:11px;padding:10px 12px;font-size:13.5px;min-height:70px;margin-top:10px;outline:none;resize:vertical;background:var(--surface);color:var(--ink)}
.discuss textarea:focus{border-color:var(--violet)}
.discuss .dact{display:flex;gap:8px;margin-top:10px;justify-content:flex-end}
.discuss .reply{background:rgba(128,61,255,.06);border:1px solid rgba(128,61,255,.2);border-radius:12px;padding:11px 13px;font-size:13px;margin-top:10px;display:none}
.discuss .reply.on{display:block}

/* activation */
.confirm{display:none;text-align:center;padding:60px 0 30px}
.confirm.on{display:block;animation:rise .5s ease}
.confirm .burst{font-size:44px}
.confirm h2{font-size:clamp(30px,4.6vw,44px);margin-top:14px}
.confirm p.lead{color:var(--muted);font-size:16px;margin-top:10px}
.confirm .made{display:flex;flex-wrap:wrap;gap:9px;justify-content:center;margin:24px 0 30px}
.confirm .made span{background:var(--surface);border:1px solid var(--line);border-radius:999px;padding:8px 16px;font-weight:700;font-size:13px}
.confirm .made .ck{color:var(--green);font-weight:900}
.confirm .bigcta{background:var(--grad2);color:#fff;font-weight:800;font-size:17px;padding:16px 34px;border-radius:14px;box-shadow:0 12px 30px rgba(128,61,255,.32)}
.confirm .alt{display:block;margin:16px auto 0;color:var(--muted);font-weight:700;font-size:13.5px;text-decoration:underline;cursor:pointer;background:none;border:none}

.toast{position:fixed;left:50%;bottom:88px;transform:translateX(-50%) translateY(12px);background:var(--slate);color:#fff;font-weight:700;font-size:14px;padding:12px 18px;border-radius:12px;box-shadow:var(--shadow);opacity:0;pointer-events:none;transition:.25s;z-index:95;max-width:92vw}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
svg.defs{position:absolute;width:0;height:0}
</style>
</head>
<body>
<svg class="defs"><defs><linearGradient id="tl" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#803DFF"/><stop offset=".55" stop-color="#3B82F6"/><stop offset="1" stop-color="#22D3EE"/></linearGradient></defs></svg>

<div class="top"><div class="topin">
  <div class="brand"><span class="mark" id="lmark"></span>Threadline<span class="tagd">Brand Reveal</span></div>
  <span class="toptime">One page · about 2 minutes</span>
</div></div>

<div class="wrap" id="reveal"></div>

<div class="confirm wrap" id="confirm"></div>

<div class="discuss" id="discuss">
  <h5>💬 Talk it through</h5>
  <textarea id="dtext" placeholder="What feels off — or what do you want to understand about these choices?"></textarea>
  <div class="reply" id="dreply"></div>
  <div class="dact"><button class="fbtn" onclick="toggleDiscuss()">Close</button><button class="fbtn on" onclick="sendDiscuss()">Send</button></div>
</div>

<div class="foot" id="foot"><div class="footin">
  <button class="fbtn" onclick="toggleDiscuss()">💬 Discuss with Threadline</button>
  <button class="fbtn" id="editBtn" onclick="toggleEdit()">✏️ Make changes</button>
  <button class="approve" onclick="approveAll()">✦ Approve &amp; activate my brand</button>
  <div class="fnote">You can refine anything later in Settings → Brand.</div>
</div></div>

<script src="threadline-brand.js"></script>
<script>
const $=s=>document.querySelector(s);
const esc=s=>(s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const strip=s=>(s||'').replace(/<[^>]+>/g,'');
const lc=s=>{s=(s||'').trim();return s?s.charAt(0).toLowerCase()+s.slice(1):s;};
const MARK='<svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg"><defs><linearGradient id="tlm" x1="6" y1="6" x2="34" y2="34" gradientUnits="userSpaceOnUse"><stop stop-color="#803DFF"/><stop offset=".55" stop-color="#3B82F6"/><stop offset="1" stop-color="#22D3EE"/></linearGradient></defs><g stroke="url(#tlm)" stroke-width="3.2" stroke-linecap="round"><path d="M9 10 H31"/><path d="M9 10 V17"/><path d="M31 10 V17"/><path d="M20 10 V31"/></g><g fill="url(#tlm)"><circle cx="9" cy="10" r="2.7"/><circle cx="31" cy="10" r="2.7"/><circle cx="20" cy="31" r="2.7"/></g></svg>';
$('#lmark').innerHTML=MARK;
const B=(window.loadBrand&&loadBrand())||defaultBrand();

function heroLogo(){
  if(B.visual&&B.visual.logo) return `<img src="${B.visual.logo}" alt="${esc(B.name)} logo">`;
  const L=esc((B.name||'B').charAt(0).toUpperCase());
  return `<svg viewBox="0 0 96 96" xmlns="http://www.w3.org/2000/svg"><rect x="8" y="8" width="80" height="80" rx="22" fill="url(#tl)"/><text x="48" y="63" text-anchor="middle" font-family="Satoshi,system-ui,sans-serif" font-weight="900" font-size="44" fill="#fff">${L}</text></svg>`;
}
function topicsFor(i){
  const Q=B.audience.questions||[];
  const sets=[
    [Q[0]||'The question they always ask','A simple framework they can use today'],
    ['The decision we debated for weeks','What we do differently — and why'],
    ['A client win, in their own words','Before → after: the honest version'],
    [strip(B.messaging.pov)||'The take nobody says out loud','The advice we refuse to give'],
    [Q[1]||'What to look for before you buy','Myth vs. reality in our category']
  ];
  return sets[i%sets.length];
}
function recoLine(){
  const kf=strip(B.positioning.knownFor||'').replace(/\.$/,'');
  const pm=strip(B.messaging.primary||'').replace(/\.$/,'');
  return `Own ${lc(kf)||'your point of view'}. ${pm}. Every idea, series, and post Threadline creates will reinforce that — which gives ${esc(B.name)} a sharper edge than a louder feed ever could.`;
}
function render(){
  $('#reveal').innerHTML=`
  <div class="hero slide">
    <div class="kick">✦ The reveal</div>
    <div class="biglogo">${heroLogo()}</div>
    <h1 data-b="name">${esc(B.name)}</h1>
    <div class="tagline" data-b="tagline">${esc(B.tagline)}</div>
    <div class="sub">Here's the brand we built together — everything below is already working for you.</div>
  </div>

  <div class="pov slide" style="animation-delay:.08s">
    <h3><span class="mark">${MARK}</span> What Threadline sees</h3>
    <div class="statement">Your brand is about helping ${strip(B.heartLine)}.</div>
    <div class="from">Built from your answers around</div>
    <div class="chips"><span>your audience</span><span>your positioning</span><span>your message</span><span>your content direction</span></div>
  </div>

  <div class="section-label">Foundation — what this brand is</div>
  <div class="bigidea slide">
    <div class="oneline" data-b="overview.oneLine">${esc(B.overview.oneLine)}</div>
    <div class="facts">
      <span>Audience: <b>${esc(B.overview.audience)}</b></span>
      <span>Known for: <b>${esc(strip(B.positioning.knownFor))}</b></span>
    </div>
  </div>
  <div class="trio">
    <div class="mini slide"><div class="mi" style="background:rgba(128,61,255,.1)">🤝</div><h4>Core promise</h4><p data-b="overview.promise">${esc(B.overview.promise)}</p></div>
    <div class="mini slide" style="animation-delay:.06s"><div class="mi" style="background:rgba(32,184,120,.12)">💛</div><h4>What you believe</h4><p data-b="messaging.beliefs">${esc(strip(B.messaging.beliefs))}</p></div>
    <div class="mini slide" style="animation-delay:.12s"><div class="mi" style="background:rgba(245,165,36,.14)">⚡</div><h4>What makes you different</h4><p data-b="overview.differentiator">${esc(B.overview.differentiator)}</p></div>
  </div>
  <div class="shift slide">
    <div class="tb from"><div class="tl">Right now they feel</div><div class="tv">${esc(B.positioning.theyFeel)}</div></div>
    <div class="arr">→</div>
    <div class="tb to"><div class="tl">You help them become</div><div class="tv">${esc(B.positioning.theyBecome)}</div></div>
  </div>

  <div class="section-label">Voice — how you sound</div>
  <div class="vcard slide" style="text-align:center;margin-bottom:14px">
    <div class="traits">${B.voice.traits.map(t=>`<span>${esc(t)}</span>`).join('')}</div>
  </div>
  <div class="voicegrid">
    <div class="vcard slide"><h4>In the wild</h4>
      <div class="speech"><div class="sl">Headline</div><div class="head">${esc(B.voice.headline)}</div></div>
      <div class="speech"><div class="sl">Caption</div><div class="cap" data-b="voice.caption">${esc(B.voice.caption)}</div></div>
      <span class="ctachip">${esc(B.voice.cta)}</span>
    </div>
    <div class="vcard slide" style="animation-delay:.06s"><h4>Gut check</h4>
      <div class="gut">
        <div class="col yes"><h5>✓ Sounds like you</h5>${B.voice.soundsLike.map(x=>`<p>${esc(x)}</p>`).join('')}</div>
        <div class="col no"><h5>✕ Doesn't</h5>${B.voice.notLike.map(x=>`<p>${esc(x)}</p>`).join('')}</div>
      </div>
    </div>
  </div>

  <div class="section-label">Themes — what you'll talk about</div>
  <div class="themes">
    ${B.pillars.map(([n,c,d,w],i)=>`<div class="theme slide" style="border-top-color:${c};animation-delay:${i*.05}s">
      <h4>${esc(n)}<span class="pct">${w}%</span></h4><p>${esc(d)}</p>
      <div class="topics">${topicsFor(i).map(t=>`<span>${esc(strip(t))}</span>`).join('')}</div>
    </div>`).join('')}
  </div>

  <div class="reco slide"><h4>✦ Threadline's recommendation</h4><p>${recoLine()}</p></div>`;
}

/* ---------- edit mode ---------- */
let editing=false;
function toggleEdit(){
  editing=!editing;
  document.body.classList.toggle('editing',editing);
  document.querySelectorAll('[data-b]').forEach(e=>e.contentEditable=editing);
  $('#editBtn').classList.toggle('on',editing);
  $('#editBtn').textContent=editing?'✓ Done editing':'✏️ Make changes';
  if(editing) toast('Click any outlined text to rewrite it — it saves to your brand');
  else{
    document.querySelectorAll('[data-b]').forEach(e=>{
      const path=e.dataset.b.split('.'); let o=B;
      while(path.length>1) o=o[path.shift()];
      o[path[0]]=e.textContent.trim()||o[path[0]];
    });
    try{ if(window.saveBrand) saveBrand(B); }catch(e){}
    toast('Saved — your brand is updated');
  }
}

/* ---------- discuss ---------- */
function toggleDiscuss(){ $('#discuss').classList.toggle('on'); if($('#discuss').classList.contains('on')) setTimeout(()=>$('#dtext').focus(),60); }
async function sendDiscuss(){
  const q=$('#dtext').value.trim(); if(!q){ $('#dtext').focus(); return; }
  const rep=$('#dreply'); rep.classList.add('on'); rep.innerHTML='<i>Threadline is thinking…</i>';
  let text=null;
  try{
    const r=await fetch('/api/ai',{method:'POST',credentials:'same-origin',headers:{'content-type':'application/json'},body:JSON.stringify({
      system:'You are Threadline, a warm, sharp brand thought partner. The founder is reviewing the brand you built together and has a question or concern. Answer in 2-3 sentences, under 60 words: explain the reasoning behind the relevant choice, and offer one concrete adjustment you could make. Plain text.',
      messages:[{role:'user',content:'Brand: '+B.name+' — '+strip(B.overview.oneLine)+'\nVoice: '+B.voice.traits.join(', ')+'\nPositioning: '+strip(B.positioning.knownFor)+'\n\nFounder says: '+q}],
      max_tokens:200})});
    if(r.ok){ const d=await r.json(); text=d&&d.content&&d.content[0]&&d.content[0].text; }
  }catch(e){}
  rep.textContent=text||('Fair point. Everything here traces back to something you told me — and nothing is locked. Hit “Make changes” to rewrite any line directly, or refine it later in Settings → Brand.');
  $('#dtext').value='';
}

/* ---------- approve & activate ---------- */
function approveAll(){
  try{ localStorage.setItem('threadline.activated','1'); }catch(e){}
  try{ if(window.tlCloudPush) tlCloudPush(); }catch(e){}
  $('#reveal').style.display='none'; $('#foot').style.display='none'; $('#discuss').classList.remove('on');
  const c=$('#confirm');
  c.innerHTML=`
    <div class="burst">🎉</div>
    <h2><span class="grad-text">${esc(B.name)}</span> is live.</h2>
    <p class="lead">Your brand is approved — and Threadline has already started building with it.</p>
    <div class="made">
      <span><span class="ck">✓</span> Idea Bank filled with starter ideas</span>
      <span><span class="ck">✓</span> ${Math.min(4,B.series.length)} series ready to activate</span>
      <span><span class="ck">✓</span> Voice model locked in</span>
      <span><span class="ck">✓</span> First weeks drafted in Plan</span>
    </div>
    <button class="bigcta" onclick="location.href='threadline-plan.html?firstweek=1'">Plan my first week →</button>
    <button class="alt" onclick="location.href='threadline-app-home.html?activate=1'">Or just open my workspace</button>`;
  c.classList.add('on');
  window.scrollTo({top:0,behavior:'smooth'});
}

function toast(msg){ let t=document.getElementById('toast'); if(!t){ t=document.createElement('div'); t.className='toast'; t.id='toast'; document.body.appendChild(t); } t.textContent=msg; t.classList.add('show'); clearTimeout(t._h); t._h=setTimeout(()=>t.classList.remove('show'),2600); }

render();
</script>
</body>
</html>
