<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Threadline — Brand Review</title>
<link rel="preconnect" href="https://api.fontshare.com" crossorigin>
<link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700,900&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#0f172a;--muted:#54607a;--faint:#8b96ad;
  --line:#e6e9f1;--line-2:#eef1f7;--bg:#f7f8fb;--surface:#ffffff;--surface-2:#f2f4f9;--slate:#0f172a;
  --violet:#803dff;--blue:#3b82f6;--cyan:#22d3ee;--coral:#fb7185;
  --green:#20b878;--amber:#f5a524;
  --grad2:linear-gradient(135deg,#803dff,#3b82f6);
  --shadow:0 18px 50px rgba(20,20,60,.10);--shadow-sm:0 4px 16px rgba(20,20,60,.06);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Satoshi',system-ui,-apple-system,sans-serif;color:var(--ink);min-height:100vh;background:var(--bg);-webkit-font-smoothing:antialiased;line-height:1.5}
h1,h2,h3,h4{font-family:'Satoshi';font-weight:900;letter-spacing:-.02em;line-height:1.12}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,textarea{font-family:inherit}
.grad-text{background:var(--grad2);-webkit-background-clip:text;background-clip:text;color:transparent}
.mark{width:26px;height:26px;flex-shrink:0}.mark svg{width:100%;height:100%;display:block}

/* header */
.top{position:sticky;top:0;z-index:30;background:rgba(247,248,251,.9);backdrop-filter:blur(10px);border-bottom:1px solid var(--line-2)}
.topin{display:flex;align-items:center;gap:14px;padding:12px 22px}
.brand{display:flex;align-items:center;gap:9px;font-weight:900;font-size:16px}
.brand .tagd{color:var(--faint);font-weight:600;font-size:13px;border-left:1px solid var(--line);padding-left:12px;margin-left:2px}
.hprog{margin-left:auto;display:flex;align-items:center;gap:12px}
.hbar{width:150px;height:8px;border-radius:5px;background:var(--surface-2);overflow:hidden}
.hbar i{display:block;height:100%;background:var(--grad2);border-radius:5px;transition:width .4s ease;width:0}
.hprog .ht{font-weight:800;font-size:13px;color:var(--muted);white-space:nowrap}

/* layout */
.shell{display:grid;grid-template-columns:230px 1fr;max-width:1120px;margin:0 auto;min-height:calc(100vh - 53px)}
.side{border-right:1px solid var(--line-2);padding:22px 16px;position:sticky;top:53px;height:calc(100vh - 53px);overflow-y:auto}
.side .sh{font-size:11px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--faint);padding:0 8px 10px}
.snav{display:flex;flex-direction:column;gap:2px}
.snav button{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:10px;font-weight:700;font-size:13.5px;color:var(--muted);text-align:left;transition:.12s}
.snav button:hover{background:var(--surface-2)}
.snav button.on{background:rgba(128,61,255,.08);color:var(--violet)}
.snav .st{width:18px;height:18px;border-radius:50%;border:2px solid var(--line);flex-shrink:0;display:grid;place-items:center;font-size:11px;font-weight:900}
.snav .st.approved{background:var(--green);border-color:var(--green);color:#fff}
.snav .st.edits{background:var(--amber);border-color:var(--amber);color:#fff}
.snav .st.discuss{background:var(--violet);border-color:var(--violet);color:#fff}
.snav .num{margin-left:auto;font-size:11px;color:var(--faint);font-weight:800}

.main{padding:34px 40px 120px;position:relative;min-width:0}
.slide{animation:fade .35s ease}
@keyframes fade{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.kicker{font-size:12px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--violet);display:flex;align-items:center;gap:8px}
.kicker .badge{color:var(--faint)}
h2.stitle{font-size:clamp(26px,3.6vw,36px);margin:12px 0 6px;text-wrap:balance}
.ssub{color:var(--muted);font-size:16px;max-width:60ch}
.says{margin:18px 0 6px;background:linear-gradient(135deg,rgba(128,61,255,.06),rgba(59,130,246,.04));border:1px solid var(--line);border-left:4px solid var(--violet);border-radius:14px;padding:15px 18px;display:flex;gap:11px;align-items:flex-start}
.says .mark{width:20px;height:20px;margin-top:1px}
.says p{font-size:15px;line-height:1.55}.says p b{font-weight:800}

.body{margin-top:24px}
.card{background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:22px;box-shadow:var(--shadow-sm);margin-bottom:16px}
.card h4{font-size:12.5px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;color:var(--faint);margin-bottom:14px}
.kv{display:grid;grid-template-columns:1fr;gap:0}
.kv .r{display:grid;grid-template-columns:180px 1fr;gap:16px;padding:12px 0;border-bottom:1px solid var(--line-2)}
.kv .r:last-child{border-bottom:none}
.kv .k{font-weight:700;font-size:13.5px;color:var(--muted)}
.kv .v{font-size:15px;font-weight:600}
@media(max-width:620px){.kv .r{grid-template-columns:1fr;gap:2px}}
.tags{display:flex;flex-wrap:wrap;gap:7px}
.tag{background:var(--surface-2);border:1px solid var(--line-2);border-radius:999px;padding:5px 12px;font-weight:700;font-size:13px}
.tag.use{background:rgba(32,184,120,.08);border-color:rgba(32,184,120,.2);color:#178a5a}
.tag.avoid{background:rgba(251,113,133,.08);border-color:rgba(251,113,133,.22);color:#c83a56;text-decoration:line-through}
.tag.v{background:rgba(128,61,255,.07);border-color:rgba(128,61,255,.16);color:var(--violet)}

.transform{display:grid;grid-template-columns:1fr auto 1fr;gap:16px;align-items:center;margin-top:4px}
.transform .tb{border-radius:14px;padding:18px;text-align:center}
.transform .from{background:rgba(251,113,133,.07);border:1px solid rgba(251,113,133,.18)}
.transform .to{background:rgba(32,184,120,.07);border:1px solid rgba(32,184,120,.18)}
.transform .tl{font-size:11.5px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;color:var(--faint);margin-bottom:6px}
.transform .tv{font-family:'Satoshi';font-weight:900;font-size:19px}
.transform .arrow{font-size:22px;color:var(--violet);font-weight:900}
@media(max-width:620px){.transform{grid-template-columns:1fr;gap:8px}.transform .arrow{transform:rotate(90deg)}}

.spectrum{margin:14px 0}
.spectrum .sr{margin-bottom:16px}
.spectrum .lbl{display:flex;justify-content:space-between;font-size:13px;font-weight:700;color:var(--muted);margin-bottom:7px}
.track{position:relative;height:8px;border-radius:5px;background:linear-gradient(90deg,var(--surface-2),var(--surface-2))}
.track .fillhalf{position:absolute;top:0;bottom:0;left:0;border-radius:5px;background:var(--grad2);opacity:.25}
.track .knob{position:absolute;top:50%;width:18px;height:18px;border-radius:50%;background:#fff;border:3px solid var(--violet);transform:translate(-50%,-50%);box-shadow:var(--shadow-sm)}

.cmp{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:620px){.cmp{grid-template-columns:1fr}}
.cmp .col{border-radius:14px;padding:16px}
.cmp .yes{background:rgba(32,184,120,.06);border:1px solid rgba(32,184,120,.18)}
.cmp .no{background:rgba(251,113,133,.05);border:1px solid rgba(251,113,133,.16)}
.cmp h5{font-size:12.5px;font-weight:800;text-transform:uppercase;letter-spacing:.04em;margin-bottom:10px;display:flex;gap:7px}
.cmp .yes h5{color:#178a5a}.cmp .no h5{color:#c83a56}
.cmp p{font-size:14px;padding:7px 0;border-bottom:1px dashed rgba(0,0,0,.06);line-height:1.4}.cmp p:last-child{border:none}

.samples .s{border:1px solid var(--line);border-radius:12px;padding:14px 16px;margin-bottom:10px;background:var(--surface-2)}
.samples .sl{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.05em;color:var(--faint);margin-bottom:6px}
.samples .head{font-family:'Satoshi';font-weight:900;font-size:19px;line-height:1.2}
.samples .cap{font-size:14.5px;line-height:1.5}
.samples .cta{display:inline-block;background:var(--grad2);color:#fff;font-weight:800;font-size:13.5px;padding:8px 15px;border-radius:9px;margin-top:2px}

.pillar{display:flex;align-items:center;gap:14px;padding:14px 0;border-bottom:1px solid var(--line-2)}.pillar:last-child{border:none}
.pillar .pc{width:12px;height:44px;border-radius:6px;flex-shrink:0}
.pillar .pn{font-weight:800;font-size:15px}
.pillar .pd{color:var(--muted);font-size:13px;margin-top:2px}
.pillar .pctl{margin-left:auto;display:flex;align-items:center;gap:10px;min-width:170px;justify-content:flex-end}
.pillar input[type=range]{width:110px;accent-color:var(--violet)}
.pillar .pv{font-weight:900;font-size:14px;color:var(--violet);width:42px;text-align:right}

.series{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:720px){.series{grid-template-columns:1fr}}
.scard{border:1px solid var(--line);border-radius:14px;padding:16px;background:var(--surface);transition:.15s}
.scard.approved{border-color:var(--green);background:rgba(32,184,120,.03)}
.scard.removed{opacity:.45;filter:grayscale(.4)}
.scard .st{font-weight:900;font-size:16px;display:flex;align-items:center;gap:8px}
.scard .meta{display:flex;flex-wrap:wrap;gap:6px;margin:8px 0}
.scard .meta span{font-size:11.5px;font-weight:700;color:var(--muted);background:var(--surface-2);border-radius:7px;padding:3px 8px}
.scard .sp{font-size:13px;color:var(--muted);line-height:1.45}
.scard .sacts{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
.minibtn{border:1.5px solid var(--line);border-radius:9px;padding:6px 11px;font-weight:800;font-size:12.5px;color:var(--muted);transition:.13s}
.minibtn:hover{border-color:var(--violet);color:var(--violet)}
.minibtn.on,.minibtn.pri{border-color:var(--violet);color:#fff;background:var(--violet)}

.vgrid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:620px){.vgrid{grid-template-columns:1fr}}
.vc{border:1px solid var(--line);border-radius:14px;padding:16px;background:var(--surface);position:relative}
.vc h5{font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.04em;color:var(--faint);margin-bottom:12px}
.vc .appr{position:absolute;top:12px;right:12px;width:24px;height:24px;border-radius:50%;border:2px solid var(--line);display:grid;place-items:center;font-weight:900;font-size:13px;color:transparent;transition:.13s}
.vc .appr.on{background:var(--green);border-color:var(--green);color:#fff}
.logobox{height:70px;border-radius:11px;background:var(--slate);display:grid;place-items:center}
.logobox.alt{background:var(--surface-2)}
.wm{font-family:'Satoshi';font-weight:900;font-size:22px;color:#fff;display:flex;align-items:center;gap:8px}
.wm.dark{color:var(--slate)}
.swatches{display:flex;gap:8px}.sw{flex:1;height:52px;border-radius:10px;display:flex;align-items:flex-end;justify-content:center;font-size:10px;font-weight:800;color:rgba(255,255,255,.9);padding-bottom:5px}
.typ .big{font-family:'Satoshi';font-weight:900;font-size:26px}.typ .sm{font-size:14px;color:var(--muted)}

.brandcard{background:var(--slate);color:#fff;border-radius:20px;padding:28px;box-shadow:var(--shadow)}
.brandcard .bc-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px}
.brandcard .bc-wm{font-family:'Satoshi';font-weight:900;font-size:24px;display:flex;align-items:center;gap:9px}
.brandcard .bc-tag{color:var(--cyan);font-weight:700;font-size:14px;margin-top:4px}
.brandcard .bc-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-top:8px}
.brandcard .bl{font-size:10.5px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:rgba(255,255,255,.5);margin-bottom:8px}
.brandcard .bswatch{display:flex;gap:6px}.brandcard .bswatch i{width:26px;height:26px;border-radius:7px}
.brandcard .bchips span{display:inline-block;background:rgba(255,255,255,.1);border-radius:7px;padding:4px 9px;font-size:12px;font-weight:700;margin:0 5px 5px 0}
.brandcard .bpos{grid-column:1/-1;font-size:15px;font-weight:600;line-height:1.4;border-top:1px solid rgba(255,255,255,.12);padding-top:16px}

/* talk drawer */
.talk{margin-top:16px;border:1px solid var(--violet);border-radius:16px;overflow:hidden;box-shadow:var(--shadow-sm);display:none}
.talk.open{display:block;animation:fade .3s ease}
.talk .th{background:linear-gradient(135deg,rgba(128,61,255,.08),rgba(59,130,246,.05));padding:13px 18px;font-weight:800;font-size:14px;color:var(--violet);display:flex;align-items:center;gap:9px;border-bottom:1px solid var(--line-2)}
.talk .th .mark{width:18px;height:18px}
.talk .msgs{padding:16px 18px;display:flex;flex-direction:column;gap:11px;max-height:280px;overflow-y:auto}
.msg{max-width:82%;padding:11px 14px;border-radius:14px;font-size:14.5px;line-height:1.5}
.msg.u{align-self:flex-end;background:var(--grad2);color:#fff;border-bottom-right-radius:5px}
.msg.a{align-self:flex-start;background:var(--surface-2);border-bottom-left-radius:5px}
.msg.a b{font-weight:800}
.talk .chipbar{display:flex;flex-wrap:wrap;gap:7px;padding:0 18px 12px}
.tchip{border:1.5px solid var(--line);border-radius:999px;padding:6px 13px;font-weight:700;font-size:13px;color:var(--muted);transition:.13s}
.tchip:hover{border-color:var(--violet);color:var(--violet)}
.talk .inrow{display:flex;gap:9px;padding:12px 18px;border-top:1px solid var(--line-2)}
.talk .inrow input{flex:1;border:1.5px solid var(--line);border-radius:11px;padding:10px 14px;font-size:14.5px;outline:none}
.talk .inrow input:focus{border-color:var(--violet)}
.talk .inrow button{background:var(--grad2);color:#fff;border-radius:11px;padding:0 18px;font-weight:800}

/* action bar */
.actbar{position:fixed;bottom:0;left:0;right:0;z-index:20;background:rgba(255,255,255,.92);backdrop-filter:blur(10px);border-top:1px solid var(--line);padding:14px 0}
.actin{max-width:1120px;margin:0 auto;padding:0 40px 0 270px;display:flex;align-items:center;gap:12px}
@media(max-width:900px){.actin{padding:0 20px}}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:12px 20px;border-radius:12px;font-weight:800;font-size:15px;transition:.15s}
.btn.solid{background:var(--grad2);color:#fff;box-shadow:0 8px 20px rgba(128,61,255,.26)}
.btn.solid:hover{filter:brightness(1.06)}
.btn.solid.big{padding:14px 26px;font-size:16px}
.btn.out{border:1.5px solid var(--line);background:var(--surface);color:var(--ink)}
.btn.out:hover{border-color:var(--violet);color:var(--violet)}
.btn.ghost{color:var(--muted)}.btn.ghost:hover{color:var(--ink)}
.approved-pill{display:inline-flex;align-items:center;gap:7px;color:var(--green);font-weight:800;font-size:14px}
.grow{flex:1}
.editing .ed{outline:2px solid var(--violet);outline-offset:3px;border-radius:4px;background:rgba(128,61,255,.03)}

.toast{position:fixed;left:50%;bottom:84px;transform:translateX(-50%) translateY(12px);background:var(--slate);color:#fff;font-weight:700;font-size:14px;padding:12px 20px;border-radius:12px;box-shadow:var(--shadow);opacity:0;pointer-events:none;transition:.25s;z-index:60}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

@media(max-width:900px){.shell{grid-template-columns:1fr}.side{display:none}.main{padding:26px 20px 120px}}

svg.defs{position:absolute;width:0;height:0}
</style>
</head>
<body>
<svg class="defs"><defs><linearGradient id="tl" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#803DFF"/><stop offset=".55" stop-color="#3B82F6"/><stop offset="1" stop-color="#22D3EE"/></linearGradient></defs></svg>

<div class="top"><div class="topin">
  <div class="brand"><span class="mark" id="hmark"></span>Threadline <span class="tagd">Brand Review</span></div>
  <div class="hprog"><div class="hbar"><i id="hbar"></i></div><span class="ht" id="ht">0 of 12 approved</span></div>
</div></div>

<div class="shell">
  <aside class="side"><div class="sh">Sections</div><div class="snav" id="snav"></div></aside>
  <main class="main" id="main"></main>
</div>

<div class="actbar"><div class="actin" id="actin"></div></div>

<script src="threadline-brand.js"></script>
<script>
const $=s=>document.querySelector(s);
const el=(t,c,h)=>{const e=document.createElement(t);if(c)e.className=c;if(h!=null)e.innerHTML=h;return e;};
const MARK='<svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg"><defs><linearGradient id="tlm" x1="6" y1="6" x2="34" y2="34" gradientUnits="userSpaceOnUse"><stop stop-color="#803DFF"/><stop offset=".55" stop-color="#3B82F6"/><stop offset="1" stop-color="#22D3EE"/></linearGradient></defs><g stroke="url(#tlm)" stroke-width="3.2" stroke-linecap="round"><path d="M9 10 H31"/><path d="M9 10 V17"/><path d="M31 10 V17"/><path d="M20 10 V31"/></g><g fill="url(#tlm)"><circle cx="9" cy="10" r="2.7"/><circle cx="31" cy="10" r="2.7"/><circle cx="20" cy="31" r="2.7"/></g></svg>';
$('#hmark').innerHTML=MARK;
const WM=`<span class="mark" style="width:22px;height:22px;display:inline-block;vertical-align:-4px">${MARK}</span>`;

/* ------- brand data (would come from onboarding) ------- */
const B = (window.loadBrand && loadBrand()) || defaultBrand();
const swTx=c=>{ const h=(c||'').replace('#',''); if(h.length<6) return '#fff'; const r=parseInt(h.slice(0,2),16),g=parseInt(h.slice(2,4),16),b=parseInt(h.slice(4,6),16); return (r*299+g*587+b*114)/1000>150?'#0f172a':'#fff'; };
const posShort=stripTags(B.positioning.statement).split('—unlike')[0].trim()+'.';

/* ------- slides (rendered from the brand model B) ------- */
const SLIDES=[
{ nav:'Overview', kicker:'Brand overview', title:'Your brand, at a glance',
  says:`Based on your answers, the heart of your brand is helping <b>${B.heartLine}.</b>`,
  body:()=>`<div class="card"><div class="kv">
    <div class="r"><div class="k">Brand name</div><div class="v ed">${B.name}</div></div>
    <div class="r"><div class="k">One-line description</div><div class="v ed">${B.overview.oneLine}</div></div>
    <div class="r"><div class="k">Mission</div><div class="v ed">${B.overview.mission}</div></div>
    <div class="r"><div class="k">Core promise</div><div class="v ed">${B.overview.promise}</div></div>
    <div class="r"><div class="k">Primary audience</div><div class="v ed">${B.overview.audience}</div></div>
    <div class="r"><div class="k">Key differentiator</div><div class="v ed" id="ov-diff">${B.overview.differentiator}</div></div>
  </div></div>`,
  chips:[{t:'Ask Threadline why',r:`The through-line in your answers kept pointing here. Your mission, your promise, and your audience all circle the same core value—so I put it at the heart.`}]
},
{ nav:'Positioning', kicker:'Positioning', title:'How your brand fits in the market',
  says:B.positioning.saysLine,
  body:()=>`<div class="card"><h4>Positioning statement</h4><p class="ed" style="font-size:16px;line-height:1.55">${B.positioning.statement}</p></div>
  <div class="card"><h4>The shift you create</h4><div class="transform">
    <div class="tb from"><div class="tl">Right now they feel</div><div class="tv">${B.positioning.theyFeel}</div></div>
    <div class="arrow">→</div>
    <div class="tb to"><div class="tl">You help them become</div><div class="tv">${B.positioning.theyBecome}</div></div>
  </div></div>
  <div class="card"><div class="kv">
    <div class="r"><div class="k">They struggle with</div><div class="v ed">${B.positioning.struggle}</div></div>
    <div class="r"><div class="k">You help them achieve</div><div class="v ed">${B.positioning.achieve}</div></div>
    <div class="r"><div class="k">How you're different</div><div class="v ed">${B.positioning.different}</div></div>
    <div class="r"><div class="k">Become known for</div><div class="v ed">${B.positioning.knownFor}</div></div>
  </div></div>`
},
{ nav:'Audience', kicker:'Audience', title:'Who you are building for',
  says:B.audience.saysLine,
  body:()=>`<div class="card"><div class="kv">
    <div class="r"><div class="k">Primary audience</div><div class="v ed">${B.audience.primary}</div></div>
    <div class="r"><div class="k">Goals</div><div class="v ed">${B.audience.goals}</div></div>
    <div class="r"><div class="k">Pain points</div><div class="v ed">${B.audience.pains}</div></div>
    <div class="r"><div class="k">Emotional needs</div><div class="v ed">${B.audience.emotional}</div></div>
    <div class="r"><div class="k">Objections</div><div class="v ed">${B.audience.objections}</div></div>
    <div class="r"><div class="k">Buying triggers</div><div class="v ed">${B.audience.triggers}</div></div>
  </div></div>
  <div class="card"><h4>Language they use</h4><div class="tags">${B.audience.language.map(x=>`<span class="tag">${x}</span>`).join('')}</div>
    <h4 style="margin-top:18px">Questions they ask</h4><div class="tags">${B.audience.questions.map(x=>`<span class="tag v">${x}</span>`).join('')}</div>

{ nav:'Personality', kicker:'Brand personality', title:'How your brand should feel',

  body:()=>`<div class="card">${B.personality.spectrums.map(([a,b,p])=>`<div class="spectrum"><div class="sr"><div class="lbl"><span>${a}</span><span>${b}</span></div><div class="track"><div class="fillhalf" style="width:${p}%"></div><div class="knob" style="left:${p}%"></div></div></div></div>`).join('')}

  says:`Approve one primary tagline. I'll keep the rest as campaign lines.`,

  <div class="card"><div class="kv">
    <div class="r"><div class="k">Supporting messages</div><div class="v ed">${B.messaging.supporting}</div></div>

{ nav:'Pillars', kicker:'Content pillars', title:'What your brand will talk about',

    <div class="pctl"><input type="range" min="5" max="60" value="${w}" data-mix="${i}"><span class="pv" data-pv="${i}">${w}%</span></div></div>`).join('')}</div>`,

{ nav:'Series', kicker:'Series opportunities', title:'How your pillars become recurring content',
  says:`These are ready to activate. Approve the ones you love; I'll set up the rest later.`,
  body:()=>`<div class="series" id="series">${B.series.map((s,i)=>`<div class="scard" data-sc="${i}"><div class="st">${s[0]}</div><div class="meta"><span>${s[1]}</span><span>↳ ${s[3]}</span></div><div class="sp">${s[2]}</div>
    <div class="sacts"><button class="minibtn" data-appr>Approve</button><button class="minibtn" data-later>Save for later</button><button class="minibtn" data-send>Send to Series</button><button class="minibtn" data-rm>Remove</button></div></div>`).join('')}</div>`,

      card.querySelector('[data-send]').onclick=()=>toast('Sent to Series →');
      card.querySelector('[data-later]').onclick=()=>toast('Saved for later');
      card.querySelector('[data-rm]').onclick=()=>{ card.classList.toggle('removed'); };
    }); }
},

    <div class="bc-top"><div><div class="bc-wm">◆ ${B.name}</div><div class="bc-tag">${B.tagline}</div></div>${WM.replace('22px','26px').replace('22px','26px')}</div>
    <div class="bc-grid">

{ nav:'Activate', kicker:'Final brand system', title:'Your brand is ready to work',
  says:`Everything below is approved and ready. Activating turns these decisions into your live content engine.`,
  body:()=>`<div class="card"><h4>Approved &amp; locked in</h4><div class="tags">
    ${['Positioning','Audience','Voice','Messaging','Pillars','Visual identity','Logo','Style guide','Recommended series'].map(x=>`<span class="tag use">✓ ${x}</span>`).join('')}
  </div></div>
  <div class="card"><h4>What Threadline does the moment you activate</h4><div class="kv">
    <div class="r"><div class="k">Idea Bank</div><div class="v">Fills with starter ideas from your audience questions, pain points &amp; beliefs.</div></div>
    <div class="r"><div class="k">Series</div><div class="v">Activates your approved series with cadence &amp; starter episodes.</div></div>
    <div class="r"><div class="k">Planner rules</div><div class="v">Creates recurring slots so your calendar fills itself.</div></div>
    <div class="r"><div class="k">First draft</div><div class="v">Builds your first four weeks of planned content.</div></div>
  </div></div>`,
  activate:true
}
];

/* ------- state ------- */
const N=SLIDES.length;
const st=SLIDES.map(()=> 'new');
let cur=0, editing=false;

function approvedCount(){ return st.filter(s=>s==='approved').length; }
function renderProg(){ const c=approvedCount(); $('#ht').textContent=c+' of '+N+' approved'; $('#hbar').style.width=(c/N*100)+'%'; }
function stIcon(s){ return s==='approved'?'✓':s==='edits'?'!':s==='discuss'?'…':''; }
function renderNav(){ const nav=$('#snav'); nav.innerHTML='';
  SLIDES.forEach((s,i)=>{ const b=el('button',(i===cur?'on':''));
    b.innerHTML=`<span class="st ${st[i]==='new'?'':st[i]}">${stIcon(st[i])}</span><span>${s.nav}</span><span class="num">${i+1}</span>`;
    b.onclick=()=>go(i); nav.appendChild(b); });
}

function go(i){ cur=Math.max(0,Math.min(N-1,i)); editing=false; render(); }

function render(){ const s=SLIDES[cur];
  const m=$('#main');
  const slide=el('div','slide');
  slide.innerHTML=`<div class="kicker">Slide ${cur+1} of ${N} · <span class="badge">${s.kicker}</span></div>
    <h2 class="stitle">${s.title}</h2>
    ${s.says?`<div class="says"><span class="mark">${MARK}</span><p>${s.says}</p></div>`:''}
    <div class="body">${s.body()}</div>
    <div class="talk" id="talk"><div class="th"><span class="mark">${MARK}</span> Talk this through with Threadline</div>
      <div class="msgs" id="msgs"></div>
      <div class="chipbar" id="chipbar"></div>
      <div class="inrow"><input id="tin" placeholder="Tell me what feels off..."><button id="tsend">Send</button></div>
    </div>`;
  m.innerHTML=''; m.appendChild(slide);
  if(s.bind) s.bind(slide);
  buildTalk(slide,s);
  renderNav(); renderProg(); renderActions(); window.scrollTo({top:0,behavior:'smooth'});
}

function buildTalk(slide,s){
  const chipbar=slide.querySelector('#chipbar');
  const chips=(s.chips||[]).concat([{t:'I like the direction',r:`Great—then let's lock it in. Hit <b>Approve &amp; continue</b> whenever you're ready, or keep editing any field inline.`}]);
  chips.forEach(c=>{ const b=el('button','tchip',c.t); b.onclick=()=>askTalk(slide,c.t,c.r,c.apply); chipbar.appendChild(b); });
  slide.querySelector('#tsend').onclick=()=>{ const v=slide.querySelector('#tin').value.trim(); if(!v)return; slide.querySelector('#tin').value='';
    askTalk(slide,v,`Got it. I can adjust for that—here's how I'd revise this section, keeping it true to your voice. Approve when it feels right.`); };
  slide.querySelector('#tin').addEventListener('keydown',e=>{ if(e.key==='Enter') slide.querySelector('#tsend').click(); });
}
function askTalk(slide,userText,reply,apply){
  openTalk();
  const msgs=slide.querySelector('#msgs');
  msgs.appendChild(el('div','msg u',userText));
  const think=el('div','msg a','<span style="opacity:.6">Threadline is thinking…</span>'); msgs.appendChild(think); msgs.scrollTop=msgs.scrollHeight;
  setTimeout(()=>{ think.innerHTML=reply; if(apply){ apply(slide); toast('Recommendation updated'); } msgs.scrollTop=msgs.scrollHeight; },800);
  if(st[cur]==='new'){ st[cur]='discuss'; renderNav(); }
}
function openTalk(){ const t=$('#talk'); if(t) t.classList.add('open'); }
function toggleTalk(){ const t=$('#talk'); if(t) t.classList.toggle('open'); }

function toggleEdit(){ editing=!editing; const slide=$('.slide'); slide.classList.toggle('editing',editing);
  slide.querySelectorAll('.ed').forEach(e=>{ e.contentEditable=editing; });
  if(editing){ toast('Editing — click any highlighted field'); }
  else { st[cur]='edits'; renderNav(); toast('Edits saved'); }
  renderActions();
}

function approve(){ st[cur]='approved'; renderNav(); renderProg();
  if(cur<N-1){ go(cur+1); } else { render(); }
}

function renderActions(){ const bar=$('#actin'); const s=SLIDES[cur]; bar.innerHTML='';
  const back=el('button','btn ghost','← Back'); back.onclick=()=>go(cur-1); if(cur===0) back.style.visibility='hidden'; bar.appendChild(back);
  bar.appendChild(el('div','grow'));
  const talkB=el('button','btn out','💬 Talk it through'); talkB.onclick=toggleTalk; bar.appendChild(talkB);
  const editB=el('button','btn out', editing?'✓ Save edits':'✎ Edit'); editB.onclick=toggleEdit; bar.appendChild(editB);
  if(s.activate){ const a=el('button','btn solid big','✦ Activate my brand'); a.onclick=activate; bar.appendChild(a); }
  else if(st[cur]==='approved'){ const p=el('span','approved-pill','✓ Approved'); bar.appendChild(p); const nx=el('button','btn out','Next →'); nx.onclick=()=>go(cur+1); bar.appendChild(nx); }
  else { const ap=el('button','btn solid','Approve & continue'); ap.onclick=approve; bar.appendChild(ap); }
}

/* ------- activation / confirmation ------- */
function activate(){
  document.querySelector('.actbar').style.display='none';
  document.querySelector('.side').style.visibility='hidden';
  const m=$('#main');
  m.innerHTML=`<div class="slide" style="text-align:center;max-width:620px;margin:10px auto;padding-top:20px">
    <div style="font-size:52px">✨</div>
    <div class="kicker" style="justify-content:center">Brand activated</div>
    <h2 class="stitle" style="margin-top:10px">Your brand is approved. Your content system is <span class="grad-text">taking shape.</span></h2>
    <p class="ssub" style="margin:14px auto 0">Threadline just turned your decisions into a working engine. Here's what's live:</p>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:26px 0;text-align:left">
      <div class="card" style="margin:0"><h4 style="color:var(--violet)">Brand Development</h4><div style="font-size:13.5px;color:var(--muted);line-height:1.7">Brand profile · Audience · Voice guide · Messaging · Pillars · Visual identity · Logo files · Brand card · Style guide</div></div>
      <div class="card" style="margin:0"><h4 style="color:var(--violet)">Idea Bank</h4><div style="font-weight:800;font-size:22px">24 starter ideas</div><div style="font-size:13px;color:var(--muted)">From your audience questions, pain points, beliefs &amp; offers.</div></div>
      <div class="card" style="margin:0"><h4 style="color:var(--violet)">Series</h4><div style="font-weight:800;font-size:22px">3 series activated</div><div style="font-size:13px;color:var(--muted)">With cadence, formats &amp; starter episodes.</div></div>
      <div class="card" style="margin:0"><h4 style="color:var(--violet)">Plan</h4><div style="font-weight:800;font-size:22px">First 4 weeks drafted</div><div style="font-size:13px;color:var(--muted)">Recurring series slots already placed.</div></div>
    </div>
    <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap">
      <button class="btn out" onclick="location.href='threadline-app-home.html?activate=1'">Review my first series</button>
      <button class="btn solid big" onclick="location.href='threadline-app-home.html?activate=1'">Open my workspace →</button>
    </div>
    <p class="grad-text" style="margin-top:22px;font-weight:800;font-size:16px">The thinking is done. Now Threadline gets to work.</p>
  </div>`;
  window.scrollTo({top:0,behavior:'smooth'});
}

function toast(msg){ let t=document.getElementById('toast'); if(!t){ t=el('div','toast'); t.id='toast'; document.body.appendChild(t); } t.textContent=msg; t.classList.add('show'); clearTimeout(t._h); t._h=setTimeout(()=>t.classList.remove('show'),2400); }

render();
(function(){ const p=new URLSearchParams(location.search).get('slide'); const n=parseInt(p,10); if(!isNaN(n)) go(Math.max(0,Math.min(N-1,n))); })();
</script>
</body>
